<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <title>${title}</title>
</head>
<body style="margin:0;padding:24px;background-color:#f5f7fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;border-collapse:collapse;background-color:#ffffff;border:1px solid #dbe3f0;border-radius:12px;">
          <tr>
            <td style="padding:32px 32px 24px 32px;">
              <p style="margin:0 0 20px 0;font-size:24px;line-height:32px;font-weight:700;color:#111827;">Kurtuba</p>
              <p style="margin:0 0 8px 0;font-size:22px;line-height:30px;font-weight:700;color:#111827;">${title}</p>
              <p style="margin:0 0 16px 0;font-size:15px;line-height:24px;">${greet},</p>
              <p style="margin:0 0 16px 0;font-size:16px;line-height:24px;">${prologue}</p>

              <div style="display:${displayLink};margin:24px 0;text-align:center;">
                <a href="${verificationLink}" target="_blank" style="display:inline-block;padding:12px 20px;background-color:#0f4c81;color:#ffffff;text-decoration:none;border-radius:8px;font-size:16px;font-weight:700;">${verifyEmail}</a>
              </div>

              <div style="display:${displayCode};margin:24px 0;padding:16px 20px;background-color:#f3f6fb;border:1px solid #dbe3f0;border-radius:10px;text-align:center;">
                <p style="margin:0;font-size:28px;line-height:36px;font-weight:700;letter-spacing:4px;color:#111827;">${verificationCode}</p>
              </div>

              <p style="margin:0 0 12px 0;font-size:15px;line-height:24px;">${epilogue}</p>
              <p style="margin:24px 0 0 0;font-size:15px;line-height:24px;">${closing},<br>${closingSubject}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px 32px;">
              <div style="padding-top:20px;border-top:1px solid #e5e7eb;">
                <p style="margin:0 0 8px 0;font-size:14px;line-height:22px;color:#4b5563;">${getInTouch}</p>
                <p style="margin:0;font-size:14px;line-height:22px;color:#4b5563;">
                  <a href="mailto:${supportEmail}" style="color:#0f4c81;text-decoration:none;">${supportEmail}</a>
                </p>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
