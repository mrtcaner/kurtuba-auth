server:
  port: 8080
  servlet:
   session:
     tracking-modes: cookie
     persistent: false

auth:
  server:
    issuer-url: ${AUTH_SERVER_ISSUER_URL:http://localhost:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        format_sql: true
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:${auth.server.issuer-url}/auth/oauth2/jwks}
      client:
        registration:
          google:
            clientId: ${GOOGLE_CLIENT_ID:example-google-client-id.apps.googleusercontent.com}
            clientSecret: ${GOOGLE_CLIENT_SECRET:example-google-client-secret}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            scope:
              - email
              - profile
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:example-mail-user}
    password: ${SPRING_MAIL_PASSWORD:example-mail-password}
    protocol: ${SPRING_MAIL_PROTOCOL:smtp}

logging:
  level:
    root: info

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health, info

kurtuba:
  jobs:
    enabled: false
  rate-limit:
    enabled: false
  server:
    url: ${KURTUBA_SERVER_URL:http://localhost:8080}
  mail:
    from-address: ${KURTUBA_MAIL_FROM_ADDRESS:no-reply@example.test}
    support-address: ${KURTUBA_MAIL_SUPPORT_ADDRESS:support@example.test}
  jwk:
    file: ${KURTUBA_JWK_FILE:classpath:jwk.json}
    keys: ${KURTUBA_JWK_KEYS:{"replace-with-your-jwk-entry-id":"replace-with-your-base64-secret"}}
  meta-change:
    email-max-try-count: 3
    sms-max-try-count: 5
    validity:
      password-reset-code:
        minutes: 30
      email:
        activation-code:
          minutes: 10080
        change-code:
          minutes: 1440
      sms:
        activation-code:
          minutes: 10
        change-code:
          minutes: 10
  job:
    email:
      send:
        max-try-count: 3
    sms:
      send:
        max-try-count: 3
  auth-provider:
    google:
      client-id: ${KURTUBA_GOOGLE_CLIENT_ID:}
      client-secret: ${KURTUBA_GOOGLE_CLIENT_SECRET:}
    facebook:
      client-id: ${KURTUBA_FACEBOOK_CLIENT_ID:}
      client-secret: ${KURTUBA_FACEBOOK_CLIENT_SECRET:}
  twilio:
    us:
      live:
        sid: ${KURTUBA_TWILIO_US_LIVE_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
        auth-token: ${KURTUBA_TWILIO_US_LIVE_AUTH_TOKEN:example-twilio-auth-token-us-live}
    messaging-service:
      sid: ${KURTUBA_TWILIO_MESSAGING_SERVICE_SID:MGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
    verify-service:
      sid: ${KURTUBA_TWILIO_VERIFY_SERVICE_SID:VAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
